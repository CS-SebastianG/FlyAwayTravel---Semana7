version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: Semana7
    environment:
      POSTGRES_DB: tropelcare
      POSTGRES_USER: tropeluser
      POSTGRES_PASSWORD: tropelpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: